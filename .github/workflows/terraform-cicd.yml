name: Terraform CI/CD - Azure Landing Zone

on:
  push:
    branches: [ main ]
    paths:
      - 'environments/**'
      - 'modules/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'environments/**'
      - 'modules/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [hub, dev, test, prod]

env:
  TF_VERSION: "1.7.5"
  WORKDIR: environments/${{ github.event.inputs.environment || 'dev' }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Get Hub Outputs (for spokes only)
        if: github.event.inputs.environment != 'hub'
        working-directory: environments/hub
        run: |
          terraform init \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=hub.terraform.tfstate"
          echo "HUB_VNET_ID=$(terraform output -raw hub_vnet_id)" >> $GITHUB_ENV
          echo "HUB_VNET_NAME=$(terraform output -raw hub_vnet_name)" >> $GITHUB_ENV
          echo "HUB_RG_NAME=$(terraform output -raw hub_resource_group_name)" >> $GITHUB_ENV
          echo "HUB_LAW_ID=$(terraform output -raw log_analytics_workspace_id)" >> $GITHUB_ENV

      - name: Terraform Plan
        run: |
          if [ "${{ github.event.inputs.environment }}" = "hub" ]; then
            terraform plan -out=tfplan
          else
            terraform plan -out=tfplan \
              -var="ssh_public_key=${{ secrets.VM_SSH_PUBLIC_KEY }}" \
              -var="hub_vnet_id=$HUB_VNET_ID" \
              -var="hub_vnet_name=$HUB_VNET_NAME" \
              -var="hub_resource_group_name=$HUB_RG_NAME" \
              -var="log_analytics_workspace_id=$HUB_LAW_ID"
          fi
        continue-on-error: false

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.WORKDIR }}/tfplan

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=tfstate-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.WORKDIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
